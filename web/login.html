<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"
        
        <link rel="icon" href="/images/favicon.ico">
        <script src="/js/utils/include.js"></script>
        <link rel="stylesheet" href="/css/style.css">
        <link rel="icon" href="/images/favicon.ico"> 

        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/font-awesome.min.css">
        <script src="/js/libs/bootstrap.min.js"></script>

    </head>

    <body class="dark">
        <div id="page-header"></div>
        <div class="container">
            <form>
                <div class="form-group">
                    <label for="username-input">Username:</label>
                    <input type="text" class="form-control bg-dark text-light" id="username-input" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="password-input">Password:
                        <span class="badge bg-danger">Required</span>
                    </label>
                    <input type="password" class="form-control bg-dark text-light" id="password-input" name="password" placeholder="Password">
                </div>

                <button type="submit" class="btn btn-primary">Submit</button>

                <div class="form-group bg-dark">
                    <label for="select-input bg-dark">Select element from a list:</label>
                    <select class="form-control bg-dark text-light" id="select-input" name="select">
                        <option value="1">Option 1</option>
                        <option value="2">Option 2</option>
                        <option value="3">Option 3</option>
                        <option value="4">Option 4</option>
                        <option value="5">Option 5</option>
                    </select>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="checkbox-id" name="checkbox">	
                    <label class="form-check-label" for="checkbox-id">
                        Option with a checkbox
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radio-button" value="1" checked>
                    <label class="form-check-label">
                        Option 1
                    </label>
                    </div>
                    <div class="form-check">
                    <input class="form-check-input" type="radio" name="radio-button" value="2">
                    <label class="form-check-label">
                        Option 2
                    </label>
                </div>



            </form>
        </div>
        <script>
            include("header.html", "#page-header");
        </script>


    </body>
</html>
