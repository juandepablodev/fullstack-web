<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"
        
        <link rel="icon" href="/images/favicon.ico">
        <script src="/js/utils/include.js"></script>
        <link rel="stylesheet" href="/css/style.css">
        <link rel="icon" href="/images/favicon.ico"> 

        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="/css/bootstrap.min.css">
        <link rel="stylesheet" href="/css/font-awesome.min.css">
        <script src="/js/libs/bootstrap.min.js"></script>

    </head>

    <body class="dark">
        <div id="page-header"></div>
        <div class="container">
        <h2>Register a new user:</h2>
        <form>
            
                <div class="row">
                    <div class="col-md">
                        <div class="form-group">
                        <label for="firstname-input">First name:</label>
                        <input type="text" class="form-control text-light bg-dark" id="firstname-input" name="firstName" placeholder="First name" required>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-group">
                        <label for="lastname-input">Last name:</label>
                        <input type="text" class="form-control text-light bg-dark" id="lastname-input" name="lastName" placeholder="Last name" required>
                        </div>
                    </div>

                </div>

                <div class="row">
                    <div class="col-md">
                        <div class="form-group">
                        <label for="email-input">Email:</label>
                        <input type="email" class="form-control text-light bg-dark" id="email-input" name="email" placeholder="youremail@gmail.com" >
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="mb-3">
                            <label for="telephone-input" class="form-label">Telephone:</label>

                            <div class="input-group">
                                <select name="prefix" id="prefix-input" class="form-select bg-dark text-light">
                                    <option value="34">+34</option>
                                    <option value="1">+1</option>
                                    <option value="other">Other</option>
                                </select>

                                <input type="tel"
                                    class="form-control bg-dark text-light"
                                    id="telephone-input"
                                    name="telephone"
                                    placeholder="Telephone number">
                            </div>
                        </div>
                    </div>

                </div>

                <div class="row">
                    <div class="col-md">
                        <div class="form-group">
                            <label for="username-input">Username:</label>
                            <input type="text" class="form-control text-light bg-dark" id="username-input" name="username" placeholder="username" required>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-group">
                            <label for="password-input">Password</label>
                            <input type="password" class="form-control text-light bg-dark" id="password-input" name="password" placeholder="password" required>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-group">
                            <label for="repeat-password-input">Repeat password</label>
                            <input type="password" class="form-control text-light bg-dark" id="repeat-password-input" name="repeat-password" placeholder="password" required>
                        </div>
                    </div>

                </div>

                <hr>

                <div class="row">
                    <div class="col-md text-center">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </div>
            </form>
        </div>
    <script>
        include("header.html", "#page-header");
    </script>
    </body>
</html>
